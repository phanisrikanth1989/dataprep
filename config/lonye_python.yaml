transformer:
  name: "SWIFT to Business Format - Lonye Python Expressions"
  version: "1.0"
  description: "RDPFA format using Python expressions for SWIFT MT940/MT950 statement transformation"

# ============================================================================
# INPUT FIELDS - Source fields from SWIFT message parsing
# ============================================================================
input_fields:
  - "messagetype"      # SWIFT message type (940/950)
  - "block1bic"        # Sender BIC from Block 1
  - "block2bic"        # Receiver BIC from Block 2
  - "block4_20"        # Transaction Reference Number
  - "block4_25"        # Account Identification
  - "block4_28"        # Statement Number (legacy)
  - "block4_28C"       # Statement Number/Sequence Number
  - "block4_60F"       # Opening Balance (First)
  - "block4_60M"       # Opening Balance (Intermediate)
  - "block4_62F"       # Closing Balance (Booked)
  - "block4_62M"       # Closing Balance (Intermediate)
  - "block4_61"        # Statement Line (Transaction details)
  - "block4_86"        # Information to Account Owner
  - "block4_64"        # Closing Available Balance

# ============================================================================
# OUTPUT LAYOUT - Complete field listing in exact output order (164 fields)
# ============================================================================
# Fields not defined in output_fields will automatically output empty string ''
# ============================================================================
output_layout:
  - TEMP1
