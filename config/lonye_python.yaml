# ============================================================================
# OUTPUT FIELD TRANSFORMATIONS
# ============================================================================
# Define transformation logic for each output field here
# ============================================================================
output_fields:

- name: TEMP1
  type: python_expression
  description: "Temporary field 1 from block4_61"
  python_expression: "str(input_row.get('block4_61', '') or '')"

- name: SIDE
  type: python_expression
  description: "Side indicator - always 'S'"
  python_expression: "'S'"

- name: TERMID
  type: python_expression
  description: "Terminal ID from block2bic"
  python_expression: "str(input_row.get('block2bic', '') or '')"

- name: DESTID
  type: python_expression
  description: "Destination ID from block1bic"
  python_expression: "str(input_row.get('block1bic', '') or '')"

- name: SUBACC
  type: python_expression
  description: "Sub-account from block4_25 with prefix normalization"
  python_expression: "(lambda v: 'CITIGB2L/EUR' if v.startswith('CITIGB2L/EUR/') or v.startswith('CITIGB2LXXX/EUR/') or v.startswith('CITIGB2L+/EUR/') else v)(str(input_row.get('block4_25', '') or ''))"

- name: STMTNO
  type: python_expression
  description: "Statement number (before slash in block4_28C)"
  python_expression: "(lambda v: v.split('/')[0] if '/' in v else v)(str(input_row.get('block4_28C', '') or ''))"

- name: STMTPG
  type: python_expression
  description: "Statement page (after slash in block4_28C, defaults to 1)"
  python_expression: "(lambda v: v.split('/')[1] if '/' in v else '1')(str(input_row.get('block4_28C', '') or ''))"

- name: IVALUEDATE
  type: python_expression
  description: "Value date from first 6 characters of block4_61"
  python_expression: "(lambda v: v[:6] if v else '')(str(input_row.get('block4_61', '') or ''))"

- name: OPBALSIGN
  type: python_expression
  description: "Opening balance sign from block4_60F or block4_60M"
  python_expression: "(lambda f, m: f[0:1] if f else m[0:1])(str(input_row.get('block4_60F', '') or ''), str(input_row.get('block4_60M', '') or ''))"

- name: OPBALTP
  type: python_expression
  description: "Opening balance type - F (First) or M (Intermediate)"
  python_expression: "'F' if input_row.get('block4_60F') else 'M'"

- name: OPBALDATE
  type: python_expression
  description: "Opening balance date (positions 2-7)"
  python_expression: "(lambda f, m: f[1:7] if f else m[1:7])(str(input_row.get('block4_60F', '') or ''), str(input_row.get('block4_60M', '') or ''))"

- name: OPBALCY
  type: python_expression
  description: "Opening balance currency (positions 8-10)"
  python_expression: "(lambda f, m: f[7:10] if f else m[7:10])(str(input_row.get('block4_60F', '') or ''), str(input_row.get('block4_60M', '') or ''))"

- name: OPBAL
  type: python_expression
  description: "Opening balance amount (position 11 onwards, comma replaced with dot)"
  python_expression: "(lambda f, m: f[10:].replace(',', '.') if f else m[10:].replace(',', '.'))(str(input_row.get('block4_60F', '') or ''), str(input_row.get('block4_60M', '') or ''))"

- name: CLBALSIGN
  type: python_expression
  description: "Closing balance sign from block4_62F or block4_62M"
  python_expression: "(lambda f, m: f[0:1] if f else m[0:1])(str(input_row.get('block4_62F', '') or ''), str(input_row.get('block4_62M', '') or ''))"

- name: CLBALTP
  type: python_expression
  description: "Closing balance type - F (Booked) or M (Intermediate)"
  python_expression: "'F' if input_row.get('block4_62F') else 'M'"

- name: CLBALDATE
  type: python_expression
  description: "Closing balance date (positions 2-7)"
  python_expression: "(lambda f, m: f[1:7] if f else m[1:7])(str(input_row.get('block4_62F', '') or ''), str(input_row.get('block4_62M', '') or ''))"

- name: CLBALCY
  type: python_expression
  description: "Closing balance currency (positions 8-10)"
  python_expression: "(lambda f, m: f[7:10] if f else m[7:10])(str(input_row.get('block4_62F', '') or ''), str(input_row.get('block4_62M', '') or ''))"

- name: CLBAL
  type: python_expression
  description: "Closing balance amount (position 11 onwards, comma replaced with dot)"
  python_expression: "(lambda f, m: f[10:].replace(',', '.') if f else m[10:].replace(',', '.'))(str(input_row.get('block4_62F', '') or ''), str(input_row.get('block4_62M', '') or ''))"

- name: IDRORCR
  type: python_expression
  description: "Debit/Credit indicator from block4_61"
  python_expression: |
    (lambda v: (
      '' if not v else (
        (('D' if len(v) > 11 and v[11] == 'C' else 'C') if len(v) > 10 and v[10] == 'R' else v[10:11])
        if v[6:10].isdigit()
        else (('D' if len(v) > 7 and v[7] == 'C' else 'C') if len(v) > 6 and v[6] == 'R' else v[6:7])
      )
    ))(str(input_row.get('block4_61', '') or ''))

- name: IAMOUNT
  type: python_expression
  description: "Transaction amount from block4_61"
  python_expression: |
    (lambda v: (
      '' if not v else (
        __import__('re').search(r'[\d.]+', v[10:].replace(',', '.')).group() if v[6:10].isdigit() and __import__('re').search(r'[\d.]+', v[10:].replace(',', '.'))
        else (__import__('re').search(r'[\d.]+', v[6:].replace(',', '.')).group() if __import__('re').search(r'[\d.]+', v[6:].replace(',', '.')) else '')
      )
    ))(str(input_row.get('block4_61', '') or ''))

- name: ITRANCODE
  type: python_expression
  description: "Transaction type code - 4 chars after first comma, removing leading numerics"
  python_expression: |
    (lambda v: (
      '' if not v or ',' not in v else (
        __import__('re').sub(r'^[0-9]+', '', v[v.index(',') + 1:])[:4]
      )
    ))(str(input_row.get('block4_61', '') or ''))

- name: IENTRYDATE
  type: python_expression
  description: "Entry date with year derivation from block4_61"
  python_expression: |
    (lambda v: (
      '' if not v else (
        (str(__import__('datetime').datetime.now().year - 1)[2:4] if __import__('datetime').datetime.now().month == 1 and v[6:8] == '12' else str(__import__('datetime').datetime.now().year)[2:4]) + v[6:10]
        if v[6:10].isdigit()
        else 'STMT_DATE'
      )
    ))(str(input_row.get('block4_61', '') or ''))

- name: ISFIELD7
  type: python_expression
  description: "Reference - digits after alphabets, between comma and //"
  python_expression: |
    (lambda v: (
      '' if not v or ',' not in v else (
        (lambda segment: (
          __import__('re').search(r'[A-Za-z]+(\d+)', segment).group(1) if __import__('re').search(r'[A-Za-z]+(\d+)', segment) else ''
        ))(
          v[v.index(',') + 1:v.index('//')] if '//' in v and v.index(',') < v.index('//')
          else (v[v.index(',') + 1:v.index('sfield9=')] if 'sfield9=' in v and v.index(',') < v.index('sfield9=')
          else v[v.index(',') + 1:])
        )
      )
    ))(str(input_row.get('block4_61', '') or ''))

- name: ISFIELD8
  type: python_expression
  description: "Reference 2 - content between // and sfield9= or after //"
  python_expression: |
    (lambda v: (
      '' if not v or '//' not in v else (
        v[v.index('//')+2:v.index('sfield9=')] if 'sfield9=' in v and v.index('//') < v.index('sfield9=')
        else v[v.index('//')+2:]
      )
    ))(str(input_row.get('block4_61', '') or ''))

- name: ISFIELD9
  type: python_expression
  description: "Reference 3 - content after sfield9="
  python_expression: |
    (lambda v: (
      '' if not v or 'sfield9=' not in v else v[v.index('sfield9=')+8:]
    ))(str(input_row.get('block4_61', '') or ''))

- name: IREFERENCE
  type: python_expression
  description: "Account owner info from block4_86 (max 210 chars)"
  python_expression: |
    (lambda v61, v86: (
      '' if not v61 else (
        '' if not v86 else (v86[:210] if len(v86) >= 210 else v86)
      )
    ))(str(input_row.get('block4_61', '') or ''), str(input_row.get('block4_86', '') or ''))

- name: ISTRING60
  type: python_expression
  description: "Substring of IREFERENCE uppercase, 70 chars starting at position 36"
  python_expression: |
    (lambda v61, v86: (
      '' if not v61 else (
        '' if not v86 else (v86[:210] if len(v86) >= 210 else v86).upper()[36:106]
      )
    ))(str(input_row.get('block4_61', '') or ''), str(input_row.get('block4_86', '') or ''))
  

- name: MSGHDRTRN
  type: python_expression
  description: "Message header transaction reference from block4_20"
  python_expression: "(lambda v61, v20: v20 if v61 else '')(str(input_row.get('block4_61', '') or ''), str(input_row.get('block4_20', '') or ''))"

- name: AVAILBALSIGN
  type: python_expression
  description: "Available balance sign from block4_64"
  python_expression: "(lambda v: v[0:1] if v else '')(str(input_row.get('block4_64', '') or ''))"

- name: AVAILBALCY
  type: python_expression
  description: "Available balance currency from block4_64"
  python_expression: "(lambda v: v[7:10] if v else '')(str(input_row.get('block4_64', '') or ''))"

- name: AVAILBAL
  type: python_expression
  description: "Available balance amount from block4_64"
  python_expression: "(lambda v: v[10:].replace(',', '.') if v else '')(str(input_row.get('block4_64', '') or ''))"

- name: TEMP4
  type: python_expression
  depends_on_lookup: true
  description: "Reference field based on lookup from OA_LONYE_ACCOUNT_COLUMN_LOOKUP.txt using SUBACC"
  python_expression: |
    (lambda valuedate, lkp_value, ref1, ref2, ref3, ref4: (
      '' if not valuedate else (
        ref1 if lkp_value == 'ref1' else (
          ref2 if lkp_value == 'ref2' else (
            ref3 if lkp_value == 'ref3' else (
              ref4 if lkp_value == 'ref4' else ''
            )
          )
        )
      )
    ))(
      str(computed.get('IVALUEDATE', '') or ''),
      str(computed.get('TEMP4_Value', '') or ''),
      str(computed.get('ISFIELD7', '') or ''),
      str(computed.get('ISFIELD8', '') or ''),
      str(computed.get('ISFIELD9', '') or ''),
      str(computed.get('IREFERENCE', '') or '')
    )

- name: ISTRING28
  type: python_expression
  depends_on_lookup: true
  description: "Lookup result from OA_RECONOURGB3_LONYE_SDE_MATCHER.txt based on TEMP4"
  python_expression: "str(computed.get('ISTRING28_Value', '') or '')"

# ============================================================================
# LOOKUPS - External file lookups for enrichment
# ============================================================================
lookups:
  - name: "TEMP4_LKP"
    file: "config/OA_LONYE_ACCOUNT_COLUMN_LOOKUP.txt"
    main_key: "SUBACC"
    lookup_key: "Key"
    columns: [TEMP4_Value]
    match_type: regex

  - name: "ISTRING28_LKP"
    file: "config/OA_RECONOURGB3_LONYE_SDE_MATCHER.txt"
    main_key: "TEMP4"
    lookup_key: "Key"
    columns: [ISTRING28_Value]
    match_type: regex
    depends_on_lookup: true
