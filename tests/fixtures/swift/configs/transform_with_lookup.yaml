# SwiftTransformer config exercising the lookups subsystem (CSV-backed
# external lookups with both 'normal' and 'regex' match types and the
# depends_on_lookup two-pass mechanism).

transformer:
  name: "SWIFT WITH LOOKUP TEST"
  version: "1.0"

input_fields:
  - block1bic
  - block2bic
  - messagetype

output_fields:
  - name: "SENDER_BIC"
    type: "direct"
    source: "block1bic"
    default: ""

  - name: "RECEIVER_BIC"
    type: "direct"
    source: "block2bic"
    default: ""

  - name: "SENDER_COUNTRY"
    type: "constant"
    value: ""
    default: ""

  - name: "RECEIVER_COUNTRY"
    type: "constant"
    value: ""
    default: ""

  - name: "BIC_PATTERN_LABEL"
    type: "constant"
    value: ""
    default: ""

  # Computed AFTER first-tier lookups land. Must reference the
  # SENDER_COUNTRY value populated by the first lookup.
  - name: "SENDER_REGION"
    type: "python_expression"
    python_expression: "'EU' if computed.get('SENDER_COUNTRY','') in ('DE','FR','IT') else 'OTHER'"
    default: ""
    depends_on_lookup: true

lookups:
  # First-tier lookup -- runs before any depends_on_lookup logic. Maps
  # SENDER_BIC to SENDER_COUNTRY using exact (normal) match.
  - name: "sender_country"
    file: "${LOOKUP_DIR}/bic_country.csv"
    main_key: "SENDER_BIC"
    lookup_key: "BIC"
    columns: ["SENDER_COUNTRY"]
    source_columns: ["country"]
    match_type: "normal"

  # First-tier lookup -- exact match -- demonstrates default
  # source_columns derivation (all non-key columns).
  - name: "receiver_country"
    file: "${LOOKUP_DIR}/bic_country.csv"
    main_key: "RECEIVER_BIC"
    lookup_key: "BIC"
    columns: ["RECEIVER_COUNTRY"]
    match_type: "normal"

  # Regex / wildcard match exercising the wildcard-to-regex translation
  # branch in _apply_lookups.
  - name: "bic_pattern"
    file: "${LOOKUP_DIR}/bic_country.csv"
    main_key: "SENDER_BIC"
    lookup_key: "pattern"
    columns: ["BIC_PATTERN_LABEL"]
    source_columns: ["pattern_label"]
    match_type: "regex"

transformations: {}
